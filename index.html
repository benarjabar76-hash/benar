<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازاڕی ئەلیکترۆنی</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">E-Bazar</div>
        <nav>
            <a href="index.html" data-lang="home">سەرەکی</a>
            <a href="product.html" data-lang="products">کاڵاکان</a>
            <a href="admin.html" data-lang="admin">ئەدمین/فرۆشیار</a>
            <button id="auth-btn">چوونەژوورەوە</button>
        </nav>
        <div class="lang-switcher">
            <button onclick="switchLang('ku')">کوردی</button>
            <button onclick="switchLang('ar')">العربية</button>
            <button onclick="switchLang('en')">English</button>
        </div>
    </header>

    <main>
        <section class="categories">
            <h2>بەشەکان</h2>
            <div class="cat-list">
                <button onclick="filterCategory('clothes-men')">جلی پیاوان</button>
                <button onclick="filterCategory('clothes-women')">جلی ئافرەتان</button>
                <button onclick="filterCategory('clothes-kids')">جلی منداڵان</button>
                <button onclick="filterCategory('mobiles')">مۆبایل</button>
                <button onclick="filterCategory('computers')">کۆمپیوتەر</button>
                <button onclick="filterCategory('home-appliances')">کەلوپەلی ناوماڵ</button>
            </div>
        </section>

        <section id="products-display" class="product-grid">
            <!-- کاڵاکان لێرە بە JS زیاد دەبن -->
        </section>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
